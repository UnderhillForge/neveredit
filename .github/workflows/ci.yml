name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11"]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: neveredit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pillow pytest ruff build
          python -m pip install moderngl glcontext || true

      - name: Compile check
        run: |
          python -m py_compile neveredit/ui/GLWindow.py \
            neveredit/ui/MapWindow.py \
            neveredit/ui/NeverEditMainApp.py \
            neveredit/util/Utils.py \
            neveredit/util/Preferences.py \
            neveredit/openglcontext/vectorutilities.py \
            neveredit/openglcontext/utilities.py \
            neveredit/openglcontext/quaternion.py

      - name: Lint tests
        run: ruff check tests

      - name: Run unit tests
        run: pytest -q

  build-wheels:
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11"]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: neveredit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build --wheel

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: neveredit/dist/*.whl
